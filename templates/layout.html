<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Casa Nova — Análise</title>
<style>
:root {
  --bg:       #0a0b0e;
  --s1:       #101116;
  --s2:       #16181f;
  --border:   #1e2028;
  --text:     #ececf0;
  --muted:    #7a7d85;
  --accent:   #b8a4ff;
  --accent-bg:#1c1531;
  --green:    #6fc786;
  --green-bg: #122a1c;
  --orange:   #d4a84b;
  --orange-bg:#2a1f08;
  --red:      #e27070;
  --red-bg:   #2d1010;
  --radius:   12px;
  --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--font);
       min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* Nav */
nav { background: var(--s1); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1rem;
             display: flex; align-items: center; gap: 0; }
.nav-brand { font-weight: 600; font-size: 0.95rem; color: var(--text);
             padding: 0.9rem 1rem 0.9rem 0; margin-right: auto;
             text-decoration: none; letter-spacing: -0.2px; }
.nav-brand span { color: var(--muted); font-weight: 400; }
.nav-link { display: flex; align-items: center; gap: 0.4rem;
            padding: 0.9rem 0.85rem; color: var(--muted); text-decoration: none;
            font-size: 0.875rem; font-weight: 500; border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); border-bottom-color: var(--accent); }
.nav-link.cta { background: var(--accent); color: #0a0b0e; border-radius: 99px;
                margin-left: 0.5rem; padding: 0.5rem 1rem; border-bottom: none;
                font-size: 0.8rem; font-weight: 600; }
.nav-link.cta:hover { background: #cdbdff; }

/* Layout */
main { max-width: 1100px; margin: 0 auto; padding: 2.25rem 1.25rem 5rem; }

/* Asterisk divider */
.divider { text-align: center; color: var(--muted); font-size: 1.1rem;
           letter-spacing: 0.6em; margin: 3rem 0 1.5rem; opacity: 0.5; }
.divider::before { content: '＊   ＊   ＊'; }

/* Flash messages */
.flashes { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
.flash { padding: 0.7rem 1rem; border-radius: var(--radius); font-size: 0.875rem;
         display: flex; align-items: center; gap: 0.5rem; }
.flash.success { background: var(--green-bg); color: var(--green);
                 border: 1px solid #1a5c2a; }
.flash.error   { background: var(--red-bg);   color: var(--red);
                 border: 1px solid #5c1a1a; }
.flash.warning { background: var(--orange-bg); color: var(--orange);
                 border: 1px solid #5c4010; }

/* Cards */
.card { background: var(--s1); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.5rem; }
.card-title { font-size: 0.8rem; font-weight: 600; color: var(--muted);
              margin-bottom: 0.5rem; }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem; margin-bottom: 1.25rem; }
.kpi { background: var(--s1); border: 1px solid var(--border);
       border-radius: var(--radius); padding: 1.35rem 1.45rem; }
.kpi-label { font-size: 0.78rem; font-weight: 500; color: var(--muted);
             margin-bottom: 0.5rem; }
.kpi-value { font-size: 1.85rem; font-weight: 600; letter-spacing: -0.6px;
             line-height: 1.15; }
.kpi-sub   { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }
.kpi.blue   .kpi-value,
.kpi.green  .kpi-value,
.kpi.orange .kpi-value,
.kpi.red    .kpi-value { color: var(--text); }

/* Section headers */
.section-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.3px;
                 color: var(--text); margin: 2.5rem 0 1rem; }

/* Tables */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
thead th { background: transparent; color: var(--muted); font-size: 0.78rem;
           font-weight: 500; padding: 0.9rem 1rem; text-align: left;
           white-space: nowrap; border-bottom: 1px solid var(--border); }
thead th.num { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--s2); }
tbody td { padding: 0.85rem 1rem; color: var(--text); }
tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody td.muted { color: var(--muted); }

/* Progress bar */
.progress { background: var(--s2); border-radius: 99px; height: 5px;
            overflow: hidden; margin-top: 0.35rem; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.fill-blue   { background: var(--accent); }
.fill-green  { background: var(--green); }
.fill-orange { background: var(--orange); }
.fill-red    { background: var(--red); }

/* Charts */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
              margin-bottom: 1.25rem; }
.chart-wrap { background: var(--s1); border: 1px solid var(--border);
              border-radius: var(--radius); padding: 1.5rem; }
.chart-label { font-size: 0.95rem; font-weight: 600; color: var(--text);
               margin-bottom: 1.1rem; letter-spacing: -0.2px; }
canvas { max-height: 260px; }

/* Forms */
.form-card { background: var(--s1); border: 1px solid var(--border);
             border-radius: var(--radius); padding: 1.5rem; max-width: 560px; }
.form-row { margin-bottom: 1rem; }
label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
input, select, textarea {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 0.9rem; font-family: var(--font);
  padding: 0.65rem 0.85rem; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none; }
input[type=checkbox], input[type=radio] {
  width: auto; padding: 0; -webkit-appearance: auto; appearance: auto; }
input:focus, select:focus { outline: none; border-color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.conta-toggle { display: flex; gap: 0.5rem; }
.conta-toggle label { text-transform: none; font-size: 0.875rem; font-weight: 500;
                      letter-spacing: 0; color: var(--text); display: flex;
                      align-items: center; gap: 0.4rem; cursor: pointer;
                      padding: 0.6rem 1rem; border: 1px solid var(--border);
                      border-radius: 7px; background: var(--s2); flex: 1;
                      justify-content: center; }
.conta-toggle input[type=radio] { width: auto; }
.conta-toggle input[type=radio]:checked + span { color: var(--accent); font-weight: 600; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.7rem 1.4rem;
       border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer;
       border: none; text-decoration: none; transition: opacity 0.15s; }
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--accent); color: #0a0b0e; width: 100%;
               justify-content: center; margin-top: 0.5rem; font-size: 0.95rem; padding: 0.85rem; }
.btn-ghost   { background: var(--s2); color: var(--text); border: 1px solid var(--border); }
.btn-green   { background: var(--green); color: #0a0b0e; }

/* Sync list */
.txn-card { background: var(--s1); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 0.85rem 1rem;
            margin-bottom: 0.6rem; }
.txn-head { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem;
            align-items: flex-start; margin-bottom: 0.65rem; }
.txn-amount { font-weight: 700; color: var(--green); font-size: 0.95rem;
              text-align: right; white-space: nowrap; }
.txn-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
.act-row { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
.act-opt { flex: 1; min-width: 100px; text-transform: none; font-size: 0.78rem;
           font-weight: 500; letter-spacing: 0; color: var(--text);
           display: flex; align-items: center; gap: 0.35rem; cursor: pointer;
           padding: 0.45rem 0.6rem; border: 1px solid var(--border);
           border-radius: 7px; background: var(--s2); margin: 0;
           justify-content: center; }
.act-opt input[type=radio] { width: auto; margin: 0; }
.act-opt:has(input:checked) { border-color: var(--accent); color: var(--accent); }
.sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.sub select, .sub input { font-size: 0.8rem; padding: 0.5rem 0.65rem; }
.btn-sm { padding: 0.45rem 0.85rem; font-size: 0.78rem; }

/* Phase bars */
.phase-row { margin-bottom: 0.9rem; }
.phase-header { display: flex; justify-content: space-between; align-items: baseline;
                margin-bottom: 0.3rem; }
.phase-name  { font-size: 0.825rem; font-weight: 600; }
.phase-vals  { font-size: 0.75rem; color: var(--muted); }

/* Badges */
.badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 99px;
         font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1px; }
.badge-blue   { background: var(--accent-bg); color: var(--accent); }
.badge-green  { background: var(--green-bg);  color: var(--green); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-red    { background: var(--red-bg);    color: var(--red); }
.badge-muted  { background: var(--s2);        color: var(--muted); }

/* Status cell toggle button */
.status-cell { white-space: nowrap; }
.badge-btn { background: transparent; border: 1px solid var(--border);
             color: var(--muted); width: 22px; height: 22px;
             border-radius: 99px; font-size: 0.75rem; line-height: 1;
             cursor: pointer; margin-left: 0.35rem; padding: 0;
             transition: all 0.15s; vertical-align: middle; }
.badge-btn:hover { color: var(--green); border-color: var(--green); }

/* Utilities */
.eur { font-variant-numeric: tabular-nums; }
.text-green  { color: var(--green); }
.text-blue   { color: var(--text); }
.text-orange { color: var(--orange); }
.text-red    { color: var(--red); }
.text-muted  { color: var(--muted); }
.fw7 { font-weight: 600; }

/* Demo mode — blur sensitive financial data for screenshots */
body.demo .eur,
body.demo .kpi-value,
body.demo .kpi-sub,
body.demo .phase-vals,
body.demo .txn-amount,
body.demo canvas,
body.demo .sensitive {
  filter: blur(6px);
  user-select: none;
  transition: filter 0.2s;
}
body.demo .sensitive:hover,
body.demo .eur:hover,
body.demo .kpi-value:hover { filter: blur(0); }

@media (max-width: 640px) {
  .kpi-grid  { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 1.25rem; }
  .chart-grid { grid-template-columns: 1fr; }
  .form-grid  { grid-template-columns: 1fr; }
  .nav-link:not(.cta) span { display: none; }
}
</style>
</head>
<body class="{% if demo %}demo{% endif %}">
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">Casa Nova <span>— Análise</span></a>
    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 14V3M6 14V8M10 14V6M14 14V2"/>
        <path d="M1 14h14"/>
      </svg>
      <span>Analytics</span>
    </a>
    <a class="nav-link {% if request.endpoint == 'sync' %}active{% endif %}" href="/sync">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11.5 10a3 3 0 000-6 4.5 4.5 0 00-8.58 1.5A3 3 0 004 11.5h7.5z"/>
      </svg>
      <span>Sync YNAB</span>
    </a>
    <a class="nav-link cta" href="/add">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/>
      </svg>
      <span>Adicionar</span>
    </a>
  </div>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flashes">
    {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
